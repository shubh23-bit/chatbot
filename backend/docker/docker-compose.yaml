services:
  milvus:
    image: milvusdb/milvus:v2.5.0
    container_name: milvus

    command: ["milvus", "run", "standalone"]

    ports:
      - "19530:19530"
      - "9091:9091"

    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: "local"

  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"

    restart: unless-stopped